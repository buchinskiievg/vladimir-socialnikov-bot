name = "vladimir-socialnikov-bot"
main = "src/index.js"
compatibility_date = "2026-05-11"

[triggers]
crons = ["0 */6 * * *", "0 4 * * *"]

[vars]
BOT_NAME = "vladimir_socialnikov_bot"
ALLOWED_TELEGRAM_USER_IDS = "5284518943"
TELEGRAM_REPORT_CHAT_ID = "5284518943"
SOCIAL_DRY_RUN = "true"
META_GRAPH_API_VERSION = "v24.0"
OPENAI_TEXT_MODEL = "gpt-4.1-mini"
GEMINI_TEXT_MODEL = "gemini-2.5-flash-lite"
MAX_DRAFTS_PER_MONITORING_RUN = "3"
REDDIT_USER_AGENT = "social-telegram-worker-bot/0.1"
PUBLIC_WORKER_URL = "https://vladimir-socialnikov-bot.vladimir-81830.workers.dev"
LINKEDIN_CLIENT_ID = "78hf3qnfs4nv0y"
LINKEDIN_REDIRECT_URI = "https://vladimir-socialnikov-bot.vladimir-81830.workers.dev/linkedin/callback"
SOURCE_SCANNER_USER_AGENT = "social-telegram-worker-bot/0.1 (+https://workers.cloudflare.com)"
ENRICH_THREADS = "true"
MAX_COMMENTS_PER_THREAD = "12"
MAX_HTML_THREAD_CHARS = "12000"
MAX_NEWS_AGE_DAYS = "14"
FINDING_SENTENCE_RETENTION_DAYS = "30"
MIN_MATERIAL_SCORE = "45"
MIN_LEAD_SCORE = "65"
COMPOSIO_ENTITY_ID = "default"
COMPOSIO_FACEBOOK_ACCOUNT_ID = "ca_L4OEZEGDVFOE"
COMPOSIO_FACEBOOK_PAGE_ID = "1126740047184347"
COMPOSIO_INSTAGRAM_ACCOUNT_ID = "ca_TMsFNCREenrF"
COMPOSIO_INSTAGRAM_USER_ID = "26047086884966268"

[[d1_databases]]
binding = "DB"
database_name = "vladimir-socialnikov-bot-db"
